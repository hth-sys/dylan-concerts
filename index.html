<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bob Dylan Concerts</title>
  <meta name="theme-color" content="#1a1a1a" />
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f4; }
    .app { max-width: 480px; margin: 0 auto; padding: 1rem; }
    .header { background: #1a1a1a; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 12px; }
    .header-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
    .header-text h1 { color: #fff; font-size: 20px; font-weight: 600; }
    .header-text p { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 2px; }
    .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: #555; font-size: 13px; cursor: pointer; }
    .filter-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .concert-card { background: #fff; border: 1px solid #eee; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 10px; }
    .concert-date { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .concert-venue { font-size: 16px; font-weight: 600; color: #111; margin-bottom: 2px; }
    .concert-location { font-size: 14px; color: #555; margin-bottom: 6px; }
    .concert-footer { display: flex; justify-content: space-between; align-items: center; }
    .days-away { font-size: 12px; color: #aaa; }
    .soon { color: #e65c00; font-weight: 600; }
    .ticket-link { font-size: 12px; color: #1a1a1a; text-decoration: none; border: 1px solid #ddd; padding: 4px 10px; border-radius: 20px; }
    .count { font-size: 13px; color: #888; margin-bottom: 10px; }
    .loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
    .error { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 10px; padding: 1rem; color: #c00; font-size: 14px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">🎸</div>
    <div class="header-text">
      <h1>HTH's Bob Dylan</h1> 
      <p id="subtitle">Upcoming concerts</p>
    </div>
  </div>
  <div class="filter-row" id="filters"></div>
  <div class="count" id="count"></div>
  <div id="concert-list"><div class="loading">Loading concerts...</div></div>
</div>

<script>
const API_KEY = 'G6ikEVj5CllubbmH5vEzA6GfLvTzhBDn';
const now = new Date();
now.setHours(0,0,0,0);
let allEvents = [];
let activeFilter = 'All';

async function fetchAllEvents() {
  try {
    const pages = [0, 1, 2];
    const results = await Promise.all(pages.map(p =>
      fetch(`https://app.ticketmaster.com/discovery/v2/events.json?attractionId=K8vZ9171ueV&classificationName=music&size=20&page=${p}&apikey=${API_KEY}`)
        .then(r => r.json())
        .then(d => d._embedded?.events || [])
    ));
    const all = results.flat();
    allEvents = all
      .filter(e => {
        const d = new Date(e.dates.start.localDate);
        return d >= now;
      })
      .sort((a, b) => new Date(a.dates.start.localDate) - new Date(b.dates.start.localDate));

    document.getElementById('subtitle').textContent = `${allEvents.length} upcoming concerts`;
    buildFilters();
    renderConcerts();
  } catch(e) {
    document.getElementById('concert-list').innerHTML =
      `<div class="error">Could not load concerts.<br><small>${e.message}</small></div>`;
  }
}

function buildFilters() {
  const states = ['All', ...new Set(allEvents.map(e => e._embedded?.venues?.[0]?.state?.stateCode).filter(Boolean))].sort();
  if (states.length <= 2) return;
  document.getElementById('filters').innerHTML = states.map(s =>
    `<button class="filter-btn${s === 'All' ? ' active' : ''}" onclick="setFilter('${s}')">${s === 'All' ? 'All' : s}</button>`
  ).join('');
}

function setFilter(s) {
  activeFilter = s;
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.textContent.trim() === (s === 'All' ? 'All' : s))
  );
  renderConcerts();
}

function daysAway(dateStr) {
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

function renderConcerts() {
  const filtered = activeFilter === 'All'
    ? allEvents
    : allEvents.filter(e => e._embedded?.venues?.[0]?.state?.stateCode === activeFilter);

  document.getElementById('count').textContent = filtered.length
    ? `${filtered.length} show${filtered.length !== 1 ? 's' : ''}` : '';

  if (!filtered.length) {
    document.getElementById('concert-list').innerHTML = `<div class="loading">No shows found.</div>`;
    return;
  }

  document.getElementById('concert-list').innerHTML = filtered.map(e => {
    const venue = e._embedded?.venues?.[0];
    const d = new Date(e.dates.start.localDate);
    const dateStr = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'long', year: 'numeric' });
    const days = daysAway(e.dates.start.localDate);
    const daysLabel = days === 0 ? 'Tonight!' : days === 1 ? 'Tomorrow!' : `${days} days away`;
    const isSoon = days <= 7;
    const city = venue ? `${venue.city?.name}, ${venue.state?.stateCode || venue.country?.countryCode}` : '';
    return `<div class="concert-card">
      <div class="concert-date">${dateStr}</div>
      <div class="concert-venue">${venue?.name || 'Venue TBA'}</div>
      <div class="concert-location">${city}</div>
      <div class="concert-footer">
        <span class="days-away${isSoon ? ' soon' : ''}">${daysLabel}</span>
        <a class="ticket-link" href="${e.url}" target="_blank">Tickets</a>
      </div>
    </div>`;
  }).join('');
}

fetchAllEvents();
</script>
</body>
</html>
